<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    
    <title>SULTAN 47: DBM</title>
    <style>
        :root { --neon: #0ff; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: #fff; }
        
        /* THE CONSOLE BOX */
        #console { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; background: #111; padding-bottom: env(safe-area-inset-bottom); }
        
        /* RENDER SCREEN WITH IMAGE OVERLAY */
        #screen { 
            width: 94vw; aspect-ratio: 1/1; 
            border: 4px solid #333; position: relative; overflow: hidden; 
            background-size: cover; background-position: center;
            transition: background-image 1s ease-in-out;
        }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; position: absolute; top: 0; left: 0; z-index: 2; }
        
        /* LOADING SCREEN */
        #loader { position: absolute; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5; }

        /* HUD */
        #hud { position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); display: flex; justify-content: space-between; font-size: 12px; color: var(--neon); z-index: 10; text-shadow: 2px 2px #000; }
        #xp-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--neon); width: 0%; z-index: 11; }

        /* CONTROLS */
        #ctrl { width: 100%; height: 40%; display: grid; grid-template-columns: 1fr 1fr; padding: 20px; background: #1a1a1a; border-top: 2px solid #333; }
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); }
        .btn { background: #222; border: 1px solid #444; color: #777; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 10px; }
        .btn:active { background: #333; color: #fff; }
        .actions { display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        .circ { width: 85px; height: 85px; border-radius: 50%; border: none; color: #fff; font-weight: bold; box-shadow: 0 5px #000; }
        .btn-a { background: #006844; } .btn-b { background: #900; }
    </style>
</head>
<body>

<div id="loader">
    <h2 style="color:var(--gold)">LOADING SULTAN 47...</h2>
</div>

<div id="console">
    <div id="screen" id="render-target">
        <div id="hud">
            <div>LVL <span id="ui-lvl">1</span> | <span id="ui-loc">LOADING</span></div>
            <div>YDS: <span id="ui-yds">0</span></div>
        </div>
        <canvas id="cvs" width="400" height="400"></canvas>
        <div id="xp-bar"></div>
    </div>

    <div id="ctrl">
        <div class="dpad">
            <div class="btn" style="grid-column:2" ontouchstart="Engine.k('U',1)" ontouchend="Engine.k('U',0)">▲</div>
            <div class="btn" style="grid-row:2;grid-column:1" ontouchstart="Engine.k('L',1)" ontouchend="Engine.k('L',0)">◀</div>
            <div class="btn" style="grid-row:2;grid-column:3" ontouchstart="Engine.k('R',1)" ontouchend="Engine.k('R',0)">▶</div>
            <div class="btn" style="grid-row:3;grid-column:2" ontouchstart="Engine.k('D',1)" ontouchend="Engine.k('D',0)">▼</div>
        </div>
        <div class="actions">
            <button class="circ btn-b" onclick="Engine.audioInit()" ontouchstart="Engine.k('B',1)" ontouchend="Engine.k('B',0)">DIVE</button>
            <button class="circ btn-a" onclick="Engine.audioInit()" ontouchstart="Engine.k('A',1)" ontouchend="Engine.k('A',0)">BOOST</button>
        </div>
    </div>
</div>

<script>
const Engine = {
    // 1. DBM SYMMETRY {(101+102+101)}
    sequence(p) {
        let l = p, eq = p.split('').reverse().join('');
        let r = eq.split('').map(c => /[a-z]/.test(c) ? String.fromCharCode(((c.charCodeAt(0)-97+1)%26)+97) : (/[1-9]/.test(c) ? (parseInt(c)%9)+1 : c)).join('');
        return { l, eq, r };
    },

    save: JSON.parse(localStorage.getItem('S47_DATA')) || { lvl: 1, xp: 0, bits: 0, currentBG: 1 },
    p: { z: 0, lane: 1, depth: 320, boost: 0, keys: {}, dive: 0, scene: '1' },
    audioContext: null,

    init() {
        this.ctx = document.getElementById('cvs').getContext('2d');
        this.screen = document.getElementById('screen');
        this.loadAssets();
        this.loop();
        
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => console.log("SW Active"));
        }
    },

    // Audio touch-to-activate (Browser Security)
    audioInit() {
        if (!this.audioContext) {
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            console.log("Audio Engine Symmetrical Link Established");
        }
    },

    loadAssets() {
        // Procedural BG Map
        this.updateBG(this.save.currentBG);
        setTimeout(() => document.getElementById('loader').style.opacity = 0, 1500);
    },

    updateBG(num) {
        this.screen.style.backgroundImage = `url('assets/bg/${num}.jpg')`;
    },

    k(key, val) { this.p.keys[key] = val; },

    update() {
        // Leveling & Map Logic
        let yds = this.p.z / 10;
        let newScene = Math.floor(yds / 1000) + 1;
        if(newScene > 10) newScene = 10;
        
        if(newScene != this.p.scene) {
            this.p.scene = newScene;
            this.updateBG(newScene);
        }

        // Boost & XP
        if(this.p.keys['A']) {
            this.p.boost = Math.min(10 + this.save.lvl, this.p.boost + 0.4);
            this.save.xp += 0.2;
        } else {
            this.p.boost = Math.max(0, this.p.boost - 0.5);
        }

        this.p.z += this.p.boost;
        
        // Lane Movement
        if(this.p.keys['L'] && this.p.lane > 0) this.p.lane -= 0.08;
        if(this.p.keys['R'] && this.p.lane < 2) this.p.lane += 0.08;
    },

    draw() {
        const { ctx, p } = this;
        ctx.clearRect(0,0,400,400);

        // Render Symmetrical DBM Player Node
        let seq = this.sequence("oO010");
        ctx.fillStyle = p.keys['B'] ? '#fff' : '#0ff';
        ctx.font = "24px monospace";
        ctx.fillText(seq.eq, 200 + (p.lane - 1) * 150 - 20, p.depth);

        // HUD
        document.getElementById('ui-lvl').innerText = this.save.lvl;
        document.getElementById('ui-yds').innerText = Math.floor(p.z/10);
        document.getElementById('ui-loc').innerText = `ZONE ${p.scene}`;
        document.getElementById('xp-bar').style.width = (this.save.xp % 100) + '%';
    },

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
};

window.onload = () => Engine.init();
</script>
</body>
</html>
