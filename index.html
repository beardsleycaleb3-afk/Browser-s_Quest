<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sultan 47: Equilibrium</title>
    <style>
        :root { --case: #1a1a1a; --neon: #0ff; }
        body { margin: 0; background: #000; font-family: monospace; overflow: hidden; touch-action: none; color: white; }
        #console { width: 100vw; height: 100vh; background: var(--case); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; }
        #screen { width: 92vw; aspect-ratio: 1/1; border: 4px solid #333; position: relative; overflow: hidden; background: #050505; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        #ctrl { width: 95vw; height: 35vh; display: grid; grid-template-columns: 1fr 1fr; }
        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); }
        .d-btn { background: #1a1a1a; border: 2px solid #333; color: #555; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .btns { display: flex; justify-content: flex-end; gap: 15px; align-items: center; }
        .circle { width: 85px; height: 85px; border-radius: 50%; border: none; color: white; font-weight: bold; font-size: 20px; box-shadow: 0 6px #000; }
    </style>
</head>
<body>

<div id="console">
    <div id="screen">
        <canvas id="gameCanvas" width="300" height="300"></canvas>
    </div>
    <div id="ctrl">
        <div class="dpad">
            <div class="d-btn" style="grid-column:2" ontouchstart="k('UP',1)" ontouchend="k('UP',0)">▲</div>
            <div class="d-btn" style="grid-row:2;grid-column:1" ontouchstart="k('LEFT',1)" ontouchend="k('LEFT',0)">◀</div>
            <div class="d-btn" style="grid-row:2;grid-column:3" ontouchstart="k('RIGHT',1)" ontouchend="k('RIGHT',0)">▶</div>
            <div class="d-btn" style="grid-row:3;grid-column:2" ontouchstart="k('DOWN',1)" ontouchend="k('DOWN',0)">▼</div>
        </div>
        <div class="btns">
            <button class="circle" style="background:#800" ontouchstart="k('B',1)" ontouchend="k('B',0)">DIVE</button>
            <button class="circle" style="background:#064" ontouchstart="k('A',1)" ontouchend="k('A',0)">BOOST</button>
        </div>
    </div>
</div>

<script>
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');

// --- SYMMETRY COMPRESSION ENGINE (101 + 102 + 101) ---
const BuddySystem = {
    // Generates Symmetrical + Equilibrium + Mirrored Right Side
    sequencer: (pattern) => {
        let left = pattern;
        let equilibrium = pattern.split('').reverse().join('');
        let right = equilibrium.split('').map(c => {
            if(/[a-z]/.test(c)) return String.fromCharCode(((c.charCodeAt(0) - 97 + 1) % 26) + 97);
            if(/[1-9]/.test(c)) return (parseInt(c) % 9) + 1;
            return c;
        }).join('');
        return { left, equilibrium, right };
    }
};

// Patterns for your 3D Nodes
const DIAMOND = "oO0011001";
const PLAYER_SPRITE = "oO001";

let p = { z: 0, lane: 1, depth: 240, boost: 0, keys: {}, dive: 0 };

function k(key, val) { p.keys[key] = val; }

function loop() {
    // 1. PHYSICS
    if (p.keys['A']) p.boost = Math.min(15, p.boost + 0.5);
    else p.boost = Math.max(0, p.boost - 0.4);

    if (p.keys['LEFT'] && p.lane > 0) p.lane -= 0.1;
    if (p.keys['RIGHT'] && p.lane < 2) p.lane += 0.1;
    if (p.keys['UP'] && p.depth > 160) p.depth -= 2;
    if (p.keys['DOWN'] && p.depth < 280) p.depth += 2;
    
    if (p.keys['B'] && p.dive <= 0) p.dive = 20;
    if (p.dive > 0) p.dive--;

    p.z += p.boost;

    // 2. RENDERING (Symmetry Buddy System)
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,300,300);

    // Render Defenders as Alphanumeric Sequences
    for(let i=0; i<3; i++) {
        let dZ = (Math.floor(p.z / 500) + i) * 500 + 500;
        let relZ = dZ - p.z;
        if(relZ > 0) {
            let s = 150 / (150 + relZ);
            let seq = BuddySystem.sequencer(DIAMOND);
            ctx.fillStyle = '#f00';
            ctx.font = (12 * s) + "px monospace";
            
            let dx = 150 + (( (Math.floor(dZ/500)*131)%3 ) - 1) * (140 * s);
            let dy = 100 + (180 * s);
            
            // Draw Symmetrical Triple-Node
            ctx.fillText(seq.left, dx - (20*s), dy);
            ctx.fillText(seq.equilibrium, dx, dy);
            ctx.fillText(seq.right, dx + (20*s), dy);
        }
    }

    // Render Player Node
    let playerSeq = BuddySystem.sequencer(PLAYER_SPRITE);
    ctx.fillStyle = p.dive > 0 ? '#fff' : '#0ff';
    let px = 150 + (p.lane - 1) * 95;
    ctx.font = "16px monospace";
    ctx.fillText(playerSeq.equilibrium, px - 15, p.depth + (p.dive > 0 ? 15 : 0));

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
